<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IELTS Hub — Random Draw</title>
<style>
:root {
  --red:#E01A22; --gold:#f59e0b; --dark:#1a1916; --g50:#f8f7f5;
  --g100:#f0eeea; --g200:#e2e0db; --g400:#9d9b96; --g600:#5c5a56;
  --g900:#1a1916;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;color:white;}

/* HEADER */
.header{background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.1);
  padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{font-size:18px;font-weight:800;color:white;}
.logo span{color:var(--red);}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;flex:1;}
select,button{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;outline:none;}
select{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2);}
select option{background:#2a2825;color:white;}
.btn-go{background:var(--red);color:white;}
.btn-go:hover{background:#c4151c;}
.btn-reset{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2);}
.status{font-size:12px;color:rgba(255,255,255,.5);margin-left:auto;}

/* WALL GRID */
.wall{padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.tile{
  border-radius:12px;padding:18px 12px;text-align:center;
  font-size:15px;font-weight:700;color:white;
  cursor:pointer;user-select:none;
  transition:transform .15s,opacity .3s,box-shadow .15s;
  position:relative;overflow:hidden;
  min-height:70px;display:flex;align-items:center;justify-content:center;
}
.tile:hover{transform:scale(1.04);box-shadow:0 4px 20px rgba(0,0,0,.4);}
.tile.eliminated{opacity:.2;transform:scale(.92);pointer-events:none;}
.tile.winner{
  animation:winPulse .6s ease-out forwards;
  box-shadow:0 0 30px rgba(255,215,0,.6);
  outline:3px solid gold;
}
@keyframes winPulse{
  0%{transform:scale(1);}
  40%{transform:scale(1.18);}
  70%{transform:scale(1.08);}
  100%{transform:scale(1.12);}
}
.tile.spinning{animation:spinFlash .15s infinite alternate;}
@keyframes spinFlash{from{filter:brightness(1.6);}to{filter:brightness(.7);}}

/* WINNER BANNER */
.banner{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.85);z-index:100;
  align-items:center;justify-content:center;flex-direction:column;gap:16px;
}
.banner.show{display:flex;}
.banner-title{font-size:18px;color:var(--gold);font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.banner-name{font-size:48px;font-weight:900;color:white;text-align:center;text-shadow:0 0 30px gold;}
.banner-btn{margin-top:12px;padding:10px 28px;border-radius:10px;background:var(--red);color:white;font-size:15px;font-weight:700;cursor:pointer;border:none;}

/* EMPTY STATE */
.empty{padding:80px 24px;text-align:center;color:rgba(255,255,255,.3);font-size:15px;}

/* WINNERS LOG */
.log{padding:0 24px 24px;display:flex;gap:10px;flex-wrap:wrap;}
.log-item{background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:700;color:white;
  display:flex;align-items:center;gap:8px;}
.log-item .rank{font-size:11px;opacity:.8;}

/* Loading */
.loading{padding:60px;text-align:center;color:rgba(255,255,255,.4);}
</style>
</head>
<body>

<div class="header">
  <div class="logo">IELTS <span>Hub</span></div>
  <div class="controls">
    <select id="selClass" onchange="loadMonths()"><option value="">— Select class —</option></select>
    <select id="selMonth"><option value="">— Month —</option></select>
    <button class="btn-go" onclick="loadCandidates()">▶ Load</button>
    <button class="btn-reset" onclick="resetDraw()">↺ Reset</button>
    <button class="btn-go" id="btnSpin" onclick="spinOne()" style="background:#6d28d9;display:none">🎯 Draw Winner</button>
  </div>
  <div class="status" id="status"></div>
</div>

<div id="winnersLog" class="log"></div>
<div id="wall" class="wall">
  <div class="empty">Select a class and month, then click Load to see eligible students.</div>
</div>

<div class="banner" id="banner">
  <div class="banner-title">🎉 Winner!</div>
  <div class="banner-name" id="bannerName"></div>
  <button class="banner-btn" onclick="closeBanner()">Continue</button>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbw8nmCHNITHKB8sdt6ysWLBs3C2uRZQL-eM1O61r9oU1UoB4lax5hMmqxv3GBdFdeOK/exec';

const COLORS=[
  '#e11d48','#7c3aed','#1d4ed8','#0891b2','#059669',
  '#d97706','#dc2626','#7c3aed','#2563eb','#0284c7',
  '#16a34a','#ca8a04','#9333ea','#0369a1','#15803d',
];

var candidates=[];
var winners=[];
var spinning=false;

async function api(action,data){
  const r=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(Object.assign({action},data))});
  return r.json();
}

// Load class list on page load
window.onload=async function(){
  try{
    var r=await api('getClassList');
    if(r.success&&r.data){
      var sel=document.getElementById('selClass');
      r.data.forEach(function(c){
        var opt=document.createElement('option');
        opt.value=c.classId; opt.textContent=c.classId;
        sel.appendChild(opt);
      });
    }
  }catch(e){console.log(e);}
};

async function loadMonths(){
  var classId=document.getElementById('selClass').value;
  var sel=document.getElementById('selMonth');
  sel.innerHTML='<option value="">— Month —</option>';
  if(!classId)return;
  try{
    var r=await api('getRewards',{classId:classId});
    if(r.success&&r.months){
      r.months.forEach(function(mo){
        var opt=document.createElement('option');
        opt.value=mo.month; opt.textContent='Month '+mo.month+' ('+mo.dates.length+' sessions)';
        sel.appendChild(opt);
      });
      // Auto-select latest month
      if(r.months.length) sel.value=r.months[r.months.length-1].month;
    }
  }catch(e){}
}

async function loadCandidates(){
  var classId=document.getElementById('selClass').value;
  var month=parseInt(document.getElementById('selMonth').value);
  var wall=document.getElementById('wall');
  if(!classId||!month){wall.innerHTML='<div class="empty">Please select class and month.</div>';return;}

  wall.innerHTML='<div class="loading">Loading diligent students…</div>';
  document.getElementById('btnSpin').style.display='none';
  document.getElementById('status').textContent='';
  winners=[];
  document.getElementById('winnersLog').innerHTML='';

  try{
    var r=await api('getRewards',{classId:classId});
    if(!r.success){wall.innerHTML='<div class="empty">Error: '+r.message+'</div>';return;}
    var mo=r.months.find(function(m){return m.month===month;});
    if(!mo){wall.innerHTML='<div class="empty">No data for this month.</div>';return;}

    // Diligent = 0 absent, 0 late, full HW, paid tuition
    candidates=mo.students.filter(function(s){
      return s.absent===0 && s.late===0 && s.tuitionPaid && s.hwDue>0 && s.hwDone>=s.hwDue;
    }).map(function(s){return s.name;});

    if(!candidates.length){
      wall.innerHTML='<div class="empty">No students meet the diligent criteria for this month.<br><br><small>Criteria: 0 absent · 0 late · full HW · tuition paid</small></div>';
      return;
    }
    renderWall();
    document.getElementById('btnSpin').style.display='block';
    document.getElementById('status').textContent=candidates.length+' eligible';
  }catch(e){wall.innerHTML='<div class="empty">Connection error. Please try again.</div>';}
}

function renderWall(){
  var wall=document.getElementById('wall');
  wall.innerHTML='';
  candidates.forEach(function(name,i){
    var tile=document.createElement('div');
    tile.className='tile';
    tile.id='tile-'+i;
    tile.textContent=name;
    tile.style.background=COLORS[i%COLORS.length];
    wall.appendChild(tile);
  });
}

function spinOne(){
  if(spinning)return;
  var remaining=candidates.filter(function(n){return !winners.includes(n);});
  if(!remaining.length){
    document.getElementById('status').textContent='All candidates drawn!';
    return;
  }
  spinning=true;
  document.getElementById('btnSpin').disabled=true;

  // Flash all remaining tiles
  var activeTiles=[];
  candidates.forEach(function(name,i){
    if(!winners.includes(name)){
      var tile=document.getElementById('tile-'+i);
      if(tile){tile.classList.add('spinning');activeTiles.push({tile,name,i});}
    }
  });

  var count=0;
  var total=25+Math.floor(Math.random()*15);
  var winner=remaining[Math.floor(Math.random()*remaining.length)];

  var interval=setInterval(function(){
    count++;
    // Highlight a random tile each tick
    activeTiles.forEach(function(t){t.tile.classList.remove('spinning');});
    var pick=activeTiles[Math.floor(Math.random()*activeTiles.length)];
    if(pick)pick.tile.classList.add('spinning');

    if(count>=total){
      clearInterval(interval);
      activeTiles.forEach(function(t){t.tile.classList.remove('spinning');});

      // Mark winner
      var winnerIdx=candidates.indexOf(winner);
      var winTile=document.getElementById('tile-'+winnerIdx);
      if(winTile)winTile.classList.add('winner');

      // Eliminate others gradually
      setTimeout(function(){
        activeTiles.forEach(function(t){
          if(t.name!==winner)t.tile.classList.add('eliminated');
        });
      },400);

      winners.push(winner);
      updateLog();

      // Show banner
      setTimeout(function(){
        document.getElementById('bannerName').textContent='🏆 '+winner;
        document.getElementById('banner').classList.add('show');
        spinning=false;
        document.getElementById('btnSpin').disabled=false;
        // Update status
        var left=candidates.filter(function(n){return !winners.includes(n);}).length;
        document.getElementById('status').textContent=winners.length+' drawn · '+left+' remaining';
        if(!left)document.getElementById('btnSpin').style.display='none';
      },800);
    }
  },80);
}

function updateLog(){
  var log=document.getElementById('winnersLog');
  log.innerHTML=winners.map(function(name,i){
    return '<div class="log-item"><span class="rank">#'+(i+1)+'</span>🏆 '+name+'</div>';
  }).join('');
}

function closeBanner(){
  document.getElementById('banner').classList.remove('show');
}

function resetDraw(){
  winners=[];
  spinning=false;
  document.getElementById('winnersLog').innerHTML='';
  document.getElementById('status').textContent=candidates.length+' eligible';
  renderWall();
  document.getElementById('btnSpin').disabled=false;
  if(candidates.length)document.getElementById('btnSpin').style.display='block';
}
</script>
</body>
</html>
